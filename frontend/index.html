<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthentiCheck - AI Review Moderation</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f7f5;
  --surface:#ffffff;
  --text:#1a1a18;
  --text2:#5f5e5a;
  --primary:#059669;
  --primary-dark:#047857;
  --primary-light:#D1FAE5;
  --border:rgba(0,0,0,0.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:var(--surface);border-bottom:0.5px solid var(--border);}
.logo{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.logo span{color:var(--primary);}
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:80vh;padding:40px;}
.hero-title{font-size:48px;font-weight:800;letter-spacing:-1.5px;margin-bottom:16px;max-width:800px;color:var(--text);}
.hero-subtitle{font-size:18px;color:var(--text2);margin-bottom:40px;max-width:600px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:100px;font-size:15px;font-weight:600;text-decoration:none;transition:all .2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 8px 16px rgba(5, 150, 105, 0.2);}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{background:var(--surface);border-color:var(--text2);transform:translateY(-2px);box-shadow:0 8px 16px rgba(0, 0, 0, 0.05);}
.actions{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}

@media(max-width:680px){
  .hero-title{font-size:36px;}
  .nav{padding:20px;}
}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo">Authenti<span>Check</span></div>
  <a href="authenticheck.html" class="btn btn-outline" style="padding:8px 16px;font-size:14px;border-radius:8px;font-weight:500;">Open Dashboard</a>
</nav>

<main class="hero">
  <div style="background:var(--primary-light);width:100px;height:100px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:24px;">
    <i class="ti ti-shield-check" style="font-size:52px;color:var(--primary);"></i>
  </div>
  
  <h1 class="hero-title">Intelligent E-Commerce Review Moderation</h1>
  <p class="hero-subtitle">
    A  multimodal pipeline that detects deceptive, vague, and irrelevant reviews using DOST-RoBERTa, M-CLIP, and XGBoost.
    <br> <br>Extract sentiment from Authentic Reviews. 
  </p>
  
  <div class="actions">
    <a href="authenticheck.html" class="btn btn-primary"><i class="ti ti-layout-dashboard"></i> View Dashboard</a>
    <a href="authenticheck.html#upload" class="btn btn-outline"><i class="ti ti-upload"></i> Upload Reviews</a>
  </div>
</main>
</body>
</html>
